services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    environment:
      APP_PORT: "8080"
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_USER: ${DB_USER:-testpilot}
      DB_PASSWORD: ${DB_PASSWORD:-testpilot}
      DB_NAME: ${DB_NAME:-testpilot}
      REDIS_ADDR: redis:6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      AUTO_SEED: ${AUTO_SEED:-true}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      RUN_FAIL_RATE: ${RUN_FAIL_RATE:-0.25}
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  mysql:
    image: mysql:8.4
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-testpilot}
      MYSQL_USER: ${DB_USER:-testpilot}
      MYSQL_PASSWORD: ${DB_PASSWORD:-testpilot}
    ports:
      - "${MYSQL_PORT:-3306}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-u${DB_USER:-testpilot}", "-p${DB_PASSWORD:-testpilot}"]
      interval: 5s
      timeout: 3s
      retries: 20

  redis:
    image: redis:7.4-alpine
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  mysql_data:
